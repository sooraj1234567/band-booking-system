<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Band - Admin Panel</title>
    
    <!-- CSS & Typography -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Dynamic Glowing Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1" style="background: var(--accent-pink);"></div>
        <div class="blob blob-2" style="background: var(--accent-violet);"></div>
    </div>

    <!-- Frosted Topbar Navigation -->
    <div class="navbar">
        <div class="logo">
            <a href="/"><i class="fa-solid fa-guitar"></i> BandSphere <span style="font-size: 13px; font-weight: 500; letter-spacing: 0.05em; background: var(--accent-pink); color: white; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 10px;">Admin</span></a>
        </div>
        <div class="nav-links">
            <a href="/"><i class="fa-solid fa-house"></i> View Website</a>
            <a href="/admin-logout" class="btn-login" style="border-color: rgba(255, 75, 43, 0.3); color: #ff4b2b;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div class="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <h2 class="logo" style="font-size: 22px; margin-bottom: 30px; padding-left: 15px; background: linear-gradient(45deg, var(--accent-pink), var(--accent-violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                <i class="fa-solid fa-lock"></i> Admin Panel
            </h2>
            <div class="sidebar-title">MANAGEMENT</div>
            <div class="sidebar-nav">
                <a href="/admin-dashboard" class="sidebar-link">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
                <a href="/manage-bands" class="sidebar-link active">
                    <i class="fa-solid fa-music"></i> Manage Bands
                </a>
                <a href="/admin-bookings" class="sidebar-link">
                    <i class="fa-solid fa-calendar-check"></i> Manage Bookings
                </a>
                <a href="/admin-messages" class="sidebar-link">
                    <i class="fa-solid fa-envelope-open-text"></i> Messages
                </a>
                <div class="sidebar-title" style="margin-top: 20px;">SYSTEM</div>
                <a href="/" class="sidebar-link">
                    <i class="fa-solid fa-house"></i> View Website
                </a>
                <a href="/admin-logout" class="sidebar-link logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </div>
        </div>

        <!-- Main Dashboard View -->
        <div class="dashboard-main">
            
            <div class="dashboard-header">
                <div>
                    <h1>Edit Band Profile</h1>
                    <p style="color: var(--text-secondary); margin-top: 5px;">Update pricing, tags, description, and listings details for {{ band[1] }}.</p>
                </div>
                <a href="/manage-bands" class="glass-btn secondary">
                    <i class="fa-solid fa-arrow-left"></i> Back to List
                </a>
            </div>

            <!-- Glassmorphism Form container -->
            <div class="glass-panel" style="padding: 40px; max-width: 650px;">
                <form method="POST">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Band Name</label>
                            <div class="form-icon-wrapper">
                                <input type="text" name="band_name" class="glass-input" value="{{ band[1] }}" required>
                                <i class="fa-solid fa-guitar"></i>
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Musical Category / Genre</label>
                            <div class="form-icon-wrapper">
                                <input type="text" name="category" class="glass-input" value="{{ band[2] }}" required>
                                <i class="fa-solid fa-tags"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Base Rate / Performance Fee (₹)</label>
                        <div class="form-icon-wrapper">
                            <input type="text" name="price" class="glass-input" value="{{ band[5] }}" required>
                            <i class="fa-solid fa-indian-rupee-sign"></i>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 30px;">
                        <label class="form-label">Band Description & Highlights</label>
                        <div class="form-icon-wrapper">
                            <textarea name="description" class="glass-input" style="height: 145px; resize: none;">{{ band[3] }}</textarea>
                            <i class="fa-solid fa-circle-info" style="top: 24px; transform: none;"></i>
                        </div>
                    </div>

                    <button type="submit" class="glass-btn" style="width: 100%;">
                        <i class="fa-solid fa-circle-check"></i> Save Changes
                    </button>
                </form>
            </div>

        </div>

    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>

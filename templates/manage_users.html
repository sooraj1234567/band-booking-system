<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        h1{
            margin-bottom:30px;
            color:#00ffff;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#1a1a1a;
            border-radius:15px;
            overflow:hidden;
        }

        th, td{
            padding:18px;
            text-align:left;
            border-bottom:1px solid #333;
        }

        th{
            background:#111;
            color:#00ffff;
        }

        tr:hover{
            background:#222;
        }

        .delete-btn{
            background:red;
            color:white;
            padding:10px 18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            text-decoration:none;
        }

    </style>

</head>
<body>

    <h1>Manage Users</h1>

    <table>

        <tr>

            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Action</th>

        </tr>

        {% for user in users %}

        <tr>

            <td>{{ user[0] }}</td>

            <td>{{ user[1] }}</td>

            <td>{{ user[2] }}</td>

            <td>

                <a
                class="delete-btn"
                href="/delete-user/{{ user[0] }}">

                Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</body>
</html>

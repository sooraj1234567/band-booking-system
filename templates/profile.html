<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .profile-box{
            width:500px;
            background:#1a1a1a;
            padding:40px;
            border-radius:20px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#00ffff;
        }

        input{
            width:100%;
            padding:14px;
            margin:12px 0;
            border:none;
            border-radius:10px;
            background:#111;
            color:white;
        }

        button{
            width:100%;
            padding:14px;
            background:#00ffff;
            border:none;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.03);
        }

    </style>

</head>
<body>

    <div class="profile-box">

        <h1>My Profile</h1>

        <form method="POST">

            <input
            type="text"
            name="fullname"
            value="{{ user[1] }}"
            required>

            <input
            type="email"
            name="email"
            value="{{ user[2] }}"
            required>

            <input
            type="password"
            name="password"
            placeholder="Enter New Password">

            <button type="submit">
                Update Profile
            </button>

        </form>

    </div>

</body>
</html>
